<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Kitty Invitation</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button class="edit-toggle" id="editToggle" type="button">编辑文字</button>

    <aside class="edit-panel" id="editPanel" hidden>
      <div class="edit-panel-header">
        <h2>页面文字</h2>
        <button id="closeEditorButton" type="button" aria-label="关闭编辑面板">×</button>
      </div>

      <label>
        首页小标题
        <input id="editInviteKicker" type="text" />
      </label>
      <label>
        首页标题
        <input id="editInviteTitle" type="text" />
      </label>
      <label>
        首页描述
        <textarea id="editInviteMessage" rows="2"></textarea>
      </label>

      <label>
        食物页标题
        <input id="editFoodTitle" type="text" />
      </label>
      <label>
        食物页描述
        <textarea id="editFoodMessage" rows="2"></textarea>
      </label>
      <label>
        食物选项
        <textarea id="editFoodOptions" rows="6"></textarea>
      </label>

      <label>
        地点页标题
        <input id="editPlaceTitle" type="text" />
      </label>
      <label>
        地点页描述
        <textarea id="editPlaceMessage" rows="2"></textarea>
      </label>
      <label>
        地点选项
        <textarea id="editPlaceOptions" rows="6"></textarea>
      </label>

      <div class="edit-actions">
        <button class="choice-button yes-button" id="saveTextButton" type="button">
          保存文字
        </button>
        <button class="choice-button no-button" id="resetTextButton" type="button">
          恢复默认
        </button>
      </div>
    </aside>

    <main class="page-shell">
      <section class="invite-card" id="inviteCard" aria-live="polite">
        <div class="ribbon" aria-hidden="true">
          <span></span>
          <span></span>
        </div>

        <div class="image-frame">
          <img
            src="./assets/sanrio-characters.png"
            alt="Sanrio characters"
            class="hero-image"
          />
        </div>

        <div class="background-tools" aria-label="更换顶部图片">
          <p>换一个背景</p>
          <div class="bg-presets">
            <button type="button" data-hero-preset="sanrio">原图</button>
            <button type="button" data-hero-preset="soft">柔粉</button>
            <button type="button" data-hero-preset="fresh">清新</button>
          </div>
          <label class="upload-bg">
            上传图片
            <input id="heroUpload" type="file" accept="image/*" />
          </label>
        </div>

        <p class="kicker">for you</p>
        <h1 id="questionTitle">可以和我一起约会嘛？</h1>
        <p class="message" id="questionMessage">
          今天的心情是粉色的，想把最可爱的位置留给你。
        </p>

        <div class="button-stage" id="buttonStage">
          <button class="choice-button yes-button" id="yesButton" type="button">
            愿意
          </button>
          <button class="choice-button no-button" id="noButton" type="button">
            不要
          </button>
        </div>
      </section>

      <section class="enter-card" id="enterCard" hidden>
        <div class="enter-glow" aria-hidden="true"></div>
        <p class="kicker">ready?</p>
        <h2>你真的愿意吗[流泪]</h2>
        <p class="message">那我们开始吧</p>
        <button class="tap-enter" id="startPlanButton" type="button">
          点击进入
        </button>
      </section>

      <section class="flow-card" id="timeCard" hidden>
        <p class="kicker">step 02</p>
        <h2>我们什么时候出发？</h2>
        <p class="message">挑一个你喜欢的时间，我会准时带着好心情出现。</p>

        <div class="time-picker">
          <label>
            <span>日期</span>
            <input id="dateInput" type="date" />
          </label>
          <label>
            <span>时间</span>
            <input id="timeInput" type="time" step="900" />
          </label>
        </div>

        <div class="time-slots" aria-label="快速选择时间">
          <button type="button" data-time="11:30">11:30</button>
          <button type="button" data-time="14:00">14:00</button>
          <button type="button" data-time="17:00">17:00</button>
          <button type="button" data-time="19:30">19:30</button>
        </div>

        <button class="choice-button yes-button next-button" id="toFoodButton" type="button">
          选好啦
        </button>
      </section>

      <section class="flow-card" id="foodCard" hidden>
        <p class="kicker">step 03</p>
        <h2>我们吃点什么？</h2>
        <p class="message">挑一个今天的约会氛围。</p>

        <div class="food-grid" id="foodGrid">
          <button type="button" data-food="披萨"><span>🍕</span>披萨</button>
          <button type="button" data-food="寿司"><span>🍣</span>寿司</button>
          <button type="button" data-food="火锅"><span>🥘</span>火锅</button>
          <button type="button" data-food="烤肉"><span>🥩</span>烤肉</button>
          <button type="button" data-food="早茶"><span>🥟</span>早茶</button>
          <button type="button" data-food="拉面"><span>🍜</span>拉面</button>
          <button type="button" data-food="麻辣烫"><span>🌶️</span>麻辣烫</button>
          <button type="button" data-food="小龙虾"><span>🦞</span>小龙虾</button>
          <button type="button" data-food="烧烤"><span>🍢</span>烧烤</button>
          <button type="button" data-food="其他"><span>🍌</span>其他</button>
        </div>

        <button class="choice-button yes-button next-button" id="toPlaceButton" type="button" disabled>
          继续选地点
        </button>
      </section>

      <section class="flow-card" id="placeCard" hidden>
        <p class="kicker">step 04</p>
        <h2>想去哪里玩？</h2>
        <p class="message">选一个适合约会的小场景。</p>

        <div class="place-grid" id="placeGrid">
          <button type="button" data-place="电影院"><span>🎬</span>电影院</button>
          <button type="button" data-place="公园"><span>🌳</span>公园</button>
          <button type="button" data-place="游乐园"><span>🎡</span>游乐园</button>
          <button type="button" data-place="咖啡店"><span>☕</span>咖啡店</button>
          <button type="button" data-place="商场"><span>🛍️</span>商场</button>
          <button type="button" data-place="海边"><span>🌊</span>海边</button>
          <button type="button" data-place="书店"><span>📚</span>书店</button>
          <button type="button" data-place="夜市"><span>🏮</span>夜市</button>
          <button type="button" data-place="拍照打卡"><span>📷</span>拍照打卡</button>
        </div>

        <button class="choice-button yes-button next-button" id="toSummaryButton" type="button" disabled>
          生成约会卡
        </button>
      </section>

      <section class="flow-card summary-card" id="summaryCard" hidden>
        <div class="success-mark" aria-hidden="true">♥</div>
        <h2>约会计划完成</h2>
        <p>那就这样说定啦，期待我们的约会ing。</p>

        <dl class="date-plan">
          <div>
            <dt>Date</dt>
            <dd id="summaryDate">-</dd>
          </div>
          <div>
            <dt>Time</dt>
            <dd id="summaryTime">-</dd>
          </div>
          <div>
            <dt>Food</dt>
            <dd id="summaryFood">-</dd>
          </div>
          <div>
            <dt>Place</dt>
            <dd id="summaryPlace">-</dd>
          </div>
        </dl>

        <button class="choice-button yes-button next-button" id="downloadButton" type="button">
          下载到手机相册
        </button>
        <p class="download-note" id="downloadNote">
          手机浏览器会下载图片，部分手机可在分享面板中保存到相册。
        </p>

        <button class="choice-button no-button next-button" id="restartButton" type="button">
          重新选择
        </button>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
